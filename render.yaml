services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Service 1: Main Django song app  →  stays on free tier
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: sing-app
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt ; python manage.py collectstatic --noinput ; python manage.py migrate
    startCommand: gunicorn sing.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: sing.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      # Render auto-wires this to the NLLB service URL below
      - key: NLLB_API_URL
        fromService:
          type: web
          name: sing-nllb-api
          property: hostport
    autoDeploy: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Service 2: NLLB microservice  →  Starter $7/mo (needs ≥2 GB RAM for model)
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: sing-nllb-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: translator
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Persist downloaded model weights across deploys
      - key: TRANSFORMERS_CACHE
        value: /opt/render/project/.cache/huggingface
    autoDeploy: true
