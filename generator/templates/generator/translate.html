    <title>KINTU: Translation Tool</title>

            <h1 class="text-primary">🌍 Translation Tool</h1>
            <a href="{% url 'home' %}" class="btn btn-outline-primary" aria-label="Home">🏠 Home</a>
        </div>

        <form method="post">
            {% csrf_token %}

                <label for="text-input" class="form-label fw-bold">Text to Translate:</label>
                <textarea id="text-input" name="text" class="form-control" rows="4"

            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="source-lang-select" class="form-label fw-bold">Source Language:</label>

                        <option value="lg" {% if source_lang == 'lg' %}selected{% endif %}>Luganda</option>

        {% if translated %}
        <div class="mt-4">
            <h3 class="text-success">Translated Text:</h3>
            <div class="alert alert-info">
                <pre>{{ translated }}</pre>
            </div>
        </div>
