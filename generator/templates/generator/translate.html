{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINTU: Translation Tool</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <div id="app-container" class="container mt-5 p-4 bg-light rounded shadow">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="text-primary">🌍 Translation Tool</h1>
            <a href="{% url 'home' %}" class="btn btn-outline-primary" aria-label="Home">🏠 Home</a>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="text-input" class="form-label fw-bold">Text to Translate:</label>
                <textarea id="text-input" name="text" class="form-control" rows="4"
                          placeholder="Enter text to translate..." required>{% if text %}{{ text }}{% endif %}</textarea>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="source-lang-select" class="form-label fw-bold">Source Language:</label>
                    <select id="source-lang-select" name="source_lang" class="form-select">
                        <option value="en" {% if source_lang == 'en' %}selected{% endif %}>English</option>
                        <option value="lg" {% if source_lang == 'lg' %}selected{% endif %}>Luganda</option>
                        <option value="sw" {% if source_lang == 'sw' %}selected{% endif %}>Swahili</option>
                        <option value="fr" {% if source_lang == 'fr' %}selected{% endif %}>French</option>
                        <option value="ar" {% if source_lang == 'ar' %}selected{% endif %}>Arabic</option>
                        <option value="es" {% if source_lang == 'es' %}selected{% endif %}>Spanish</option>
                        <option value="de" {% if source_lang == 'de' %}selected{% endif %}>German</option>
                        <option value="zh" {% if source_lang == 'zh' %}selected{% endif %}>Chinese</option>
                        <option value="ja" {% if source_lang == 'ja' %}selected{% endif %}>Japanese</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label for="target-lang-select" class="form-label fw-bold">Target Language:</label>
                    <select id="target-lang-select" name="target_lang" class="form-select">
                        <option value="en" {% if target_lang == 'en' %}selected{% endif %}>English</option>
                        <option value="lg" {% if target_lang == 'lg' %}selected{% endif %}>Luganda</option>
                        <option value="sw" {% if target_lang == 'sw' %}selected{% endif %}>Swahili</option>
                        <option value="fr" {% if target_lang == 'fr' %}selected{% endif %}>French</option>
                        <option value="ar" {% if target_lang == 'ar' %}selected{% endif %}>Arabic</option>
                        <option value="es" {% if target_lang == 'es' %}selected{% endif %}>Spanish</option>
                        <option value="de" {% if target_lang == 'de' %}selected{% endif %}>German</option>
                        <option value="zh" {% if target_lang == 'zh' %}selected{% endif %}>Chinese</option>
                        <option value="ja" {% if target_lang == 'ja' %}selected{% endif %}>Japanese</option>
                    </select>
                </div>
            </div>

            <div class="d-grid gap-2 mb-4">
                <button type="submit" class="btn btn-primary btn-lg">Translate</button>
            </div>
        </form>

        {% if translated %}
        <div class="mt-4">
            <h3 class="text-success">Translated Text:</h3>
            <div class="alert alert-info">
                <pre>{{ translated }}</pre>
            </div>
        </div>
        {% endif %}
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
